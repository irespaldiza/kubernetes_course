apiVersion: apps/v1
kind: Deployment
metadata:
  name: reconciliation-demo
  namespace: demo-architecture
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reconciliation-demo
  template:
    metadata:
      labels:
        app: reconciliation-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
