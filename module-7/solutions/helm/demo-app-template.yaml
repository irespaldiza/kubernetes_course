---
# Source: demo-app/templates/database-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: demo-app-database-secret
  namespace: demo-app
  labels:
    app.kubernetes.io/instance: demo-app
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: demo-app-0.1.0
type: Opaque
stringData:
  POSTGRES_DB: "appdb"
  POSTGRES_USER: "app"
  POSTGRES_PASSWORD: "app"
  DATABASE_URL: "postgres://app:app@demo-app-postgres:5432/appdb?sslmode=disable"
---
# Source: demo-app/templates/frontend-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-frontend-nginx-config
  namespace: demo-app
  labels:
    app.kubernetes.io/instance: demo-app
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: demo-app-0.1.0
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
    
      root /usr/share/nginx/html;
      index index.html;
    
      location / {
        try_files $uri /index.html;
      }
    
      location /api/catalog/ {
        proxy_pass http://demo-app-catalog-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    
      location /api/orders/ {
        proxy_pass http://demo-app-orders-service:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
---
