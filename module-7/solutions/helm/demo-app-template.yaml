# Source: demo-app/templates/postgres.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: demo-app-postgres
  namespace: demo-app
  labels:
    app.kubernetes.io/component: postgres
    app.kubernetes.io/instance: demo-app
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: demo-app-0.1.0
spec:
  serviceName: demo-app-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
      app.kubernetes.io/instance: demo-app
      app.kubernetes.io/name: demo-app
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
        app.kubernetes.io/instance: demo-app
        app.kubernetes.io/name: demo-app
    spec:
      containers:
        - name: postgres
          image: "postgres:16-alpine"
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: demo-app-database-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: demo-app-database-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-app-database-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
              readOnly: true
      volumes:
        - name: postgres-init
          configMap:
            name: demo-app-postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app.kubernetes.io/instance: demo-app
          app.kubernetes.io/name: demo-app
          app.kubernetes.io/managed-by: Helm
          helm.sh/chart: demo-app-0.1.0
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
# Source: demo-app/templates/frontend.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-app-frontend
  namespace: demo-app
  labels:
    app.kubernetes.io/component: frontend
    app.kubernetes.io/instance: demo-app
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: demo-app-0.1.0
spec:
  ingressClassName: nginx
  rules:
    - host: frontend.demo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-app-frontend
                port:
                  number: 80
