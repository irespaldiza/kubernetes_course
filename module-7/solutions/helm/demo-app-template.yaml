apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app-catalog-service
  namespace: demo-app
  labels:
    app.kubernetes.io/component: catalog-service
    app.kubernetes.io/instance: demo-app
    app.kubernetes.io/name: demo-app
