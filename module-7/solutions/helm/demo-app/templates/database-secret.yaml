apiVersion: v1
kind: Secret
metadata:
  name: {{ include "demo-app.databaseSecret.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "demo-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.database.name | quote }}
  POSTGRES_USER: {{ .Values.database.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.database.password | quote }}
  DATABASE_URL: {{ tpl .Values.database.databaseUrl . | quote }}
