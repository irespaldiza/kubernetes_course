apiVersion: v1
kind: Service
metadata:
  name: {{ include "demo-app.catalog.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: catalog-service
    {{- include "demo-app.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: catalog-service
    {{- include "demo-app.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.catalogService.service.port }}
      targetPort: {{ .Values.catalogService.containerPort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "demo-app.catalog.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: catalog-service
    {{- include "demo-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.catalogService.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: catalog-service
      {{- include "demo-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: catalog-service
        {{- include "demo-app.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: catalog-service
          image: "{{ .Values.catalogService.image.repository }}:{{ .Values.catalogService.image.tag }}"
          imagePullPolicy: {{ .Values.catalogService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.catalogService.containerPort }}
          env:
            - name: PORT
              value: {{ .Values.catalogService.containerPort | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "demo-app.databaseSecret.fullname" . }}
                  key: DATABASE_URL
