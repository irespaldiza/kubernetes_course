apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "demo-app.fullname" . }}-frontend-test"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "demo-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command:
        - sh
        - -c
        - wget -qO- http://{{ include "demo-app.frontend.fullname" . }}:{{ .Values.frontend.service.port }}/
