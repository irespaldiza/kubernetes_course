apiVersion: v1
kind: Service
metadata:
  name: {{ include "whoami-python.fullname" . }}
  labels:
    {{- include "whoami-python.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "whoami-python.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8080
