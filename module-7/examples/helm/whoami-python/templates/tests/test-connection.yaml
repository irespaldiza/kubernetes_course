apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "whoami-python.fullname" . }}-test"
  labels:
    {{- include "whoami-python.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command:
        - sh
        - -c
        - wget -qO- http://{{ include "whoami-python.fullname" . }}:{{ .Values.service.port }}/health
