apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: demo-app-prod
resources:
  - namespace.yaml
  - ../../base
labels:
  - pairs:
      app.kubernetes.io/environment: prod
      app.kubernetes.io/part-of: module-7
patches:
  - target:
      kind: Deployment
      name: whoami-python
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: whoami-python
      spec:
        template:
          spec:
            containers:
              - name: whoami-python
                env:
                  - name: MESSAGE
                    value: hello from kustomize prod
images:
  - name: module4/whoami-python
    newName: module4/whoami-python
    newTag: stable
replicas:
  - name: whoami-python
    count: 3
