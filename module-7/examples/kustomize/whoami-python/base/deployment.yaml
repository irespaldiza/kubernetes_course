apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami-python
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami-python
  template:
    metadata:
      labels:
        app: whoami-python
    spec:
      containers:
        - name: whoami-python
          image: module4/whoami-python:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: MESSAGE
              value: hello from base
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
