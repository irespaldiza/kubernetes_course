apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: frontend
  name: frontend
spec:
  ports:
    - name: "8080"
      port: 8080
      targetPort: 80
  selector:
    io.kompose.service: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: frontend
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: frontend
  template:
    metadata:
      labels:
        io.kompose.service: frontend
    spec:
      containers:
        - image: module0/frontend:local
          imagePullPolicy: Never
          name: frontend
          ports:
            - containerPort: 80
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: catalog-service
  name: catalog-service
spec:
  ports:
    - name: "8000"
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: catalog-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: catalog-service
  name: catalog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: catalog-service
  template:
    metadata:
      labels:
        io.kompose.service: catalog-service
    spec:
      containers:
        - image: module0/catalog-service:local
          imagePullPolicy: Never
          name: catalog-service
          env:
            - name: PORT
              value: "8000"
            - name: DATABASE_URL
              value: postgresql://app:app@postgres:5432/appdb
          ports:
            - containerPort: 8000
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: orders-service
  name: orders-service
spec:
  ports:
    - name: "8080"
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: orders-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: orders-service
  name: orders-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: orders-service
  template:
    metadata:
      labels:
        io.kompose.service: orders-service
    spec:
      containers:
        - image: module0/orders-service-go:local
          imagePullPolicy: Never
          name: orders-service
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              value: postgres://app:app@postgres:5432/appdb?sslmode=disable
            - name: REDIS_ADDR
              value: redis:6379
            - name: CATALOG_URL
              value: http://catalog-service:8000
          ports:
            - containerPort: 8080
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: postgres
  name: postgres
spec:
  ports:
    - name: "5432"
      port: 5432
      targetPort: 5432
  selector:
    io.kompose.service: postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    io.kompose.service: postgres-data
  name: postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: postgres
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: postgres
  template:
    metadata:
      labels:
        io.kompose.service: postgres
    spec:
      containers:
        - image: postgres:16-alpine
          name: postgres
          env:
            - name: POSTGRES_DB
              value: appdb
            - name: POSTGRES_USER
              value: app
            - name: POSTGRES_PASSWORD
              value: app
          ports:
            - containerPort: 5432
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-data
      restartPolicy: Always
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: redis
  name: redis
spec:
  ports:
    - name: "6379"
      port: 6379
      targetPort: 6379
  selector:
    io.kompose.service: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: redis
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: redis
  template:
    metadata:
      labels:
        io.kompose.service: redis
    spec:
      containers:
        - image: redis:7-alpine
          name: redis
          ports:
            - containerPort: 6379
      restartPolicy: Always
