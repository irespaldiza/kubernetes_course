apiVersion: v1
kind: Pod
metadata:
  name: whoami
  namespace: demo-app
  labels:
    app: whoami
spec:
  containers:
    - name: whoami
      image: module2/whoami:local
      imagePullPolicy: Never
      ports:
        - containerPort: 8080
      env:
        - name: PORT
          value: "8080"
        - name: MY_ENV_VAR
          value: module-2-demo
