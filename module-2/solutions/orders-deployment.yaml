apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-service
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-service
  template:
    metadata:
      labels:
        app: orders-service
    spec:
      containers:
        - name: orders-service
          image: module0/orders-service-go:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: CATALOG_URL
              value: http://catalog-service:8000
