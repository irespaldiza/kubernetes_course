apiVersion: v1
kind: Service
metadata:
  name: metrics-demo
  namespace: demo-app
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
spec:
  selector:
    app: metrics-demo
  ports:
    - name: http
      port: 8080
      targetPort: 8080
