apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-file
  namespace: demo-app
data:
  app.properties: |
    APP_NAME=demo-app
    APP_ENV=training
    APP_FEATURE_PERSISTENCE=true
---
apiVersion: v1
kind: Pod
metadata:
  name: configmap-file-demo
  namespace: demo-app
spec:
  containers:
    - name: reader
      image: busybox:1.36
      command: ["sh", "-c", "cat /config/app.properties && sleep 3600"]
      volumeMounts:
        - name: config
          mountPath: /config/app.properties
          subPath: app.properties
          readOnly: true
  volumes:
    - name: config
      configMap:
        name: app-config-file
