apiVersion: v1
kind: Service
metadata:
  name: identity-demo
  namespace: demo-app
spec:
  clusterIP: None
  selector:
    app: identity-demo
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: identity-demo
  namespace: demo-app
spec:
  serviceName: identity-demo
  replicas: 2
  selector:
    matchLabels:
      app: identity-demo
  template:
    metadata:
      labels:
        app: identity-demo
    spec:
      containers:
        - name: identity-demo
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "$(hostname)" > /data/pod-name.txt
              echo "statefulset demo" >> /data/pod-name.txt
              while true; do sleep 3600; done
          volumeMounts:
            - name: app-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: app-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 64Mi
