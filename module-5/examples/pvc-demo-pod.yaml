apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: demo-pvc
  namespace: demo-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 128Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: pvc-demo
  namespace: demo-app
spec:
  containers:
    - name: writer
      image: busybox:1.36
      command: ["sh", "-c", "echo pod-start $(date -u +%FT%TZ) >> /data/history.log && sleep 3600"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: demo-pvc
